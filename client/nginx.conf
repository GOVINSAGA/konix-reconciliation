server {
    listen 80;
    server_name konix.govinsaga.pp.ua;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name konix.govinsaga.pp.ua;

    ssl_certificate /etc/letsencrypt/live/konix.govinsaga.pp.ua/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/konix.govinsaga.pp.ua/privkey.pem;

    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy API requests to NestJS backend
    location /api/ {
        proxy_pass http://konix-server:3000/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
